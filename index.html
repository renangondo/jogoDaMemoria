<!DOCTYPE html>
<html lang="pt-br" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <title>Jogo da Memória</title>
</head>

<body>

    <h1>JOGO DA MEMÓRIA</h1>
    <header>
        <span>Tentativas: 0 </span>
        <button id="btnReiniciar">Reiniciar</button>
        <button id="btnAlterarTema">Alterar tema</button>
    </header>
    <div id="menu">
        <button id="btnNovoJogo">Novo Jogo</button>
        <button id="btnRanking">Ranking</button>
    </div>

    <div id="ranking" style="display:none;">
        <h2>🏆 Ranking</h2>
        <ul id="listaRanking"></ul>
        <button id="voltarMenu">Voltar</button>
    </div>
    
    <div class="cards">
        <button class="btnCards">?</button>
        <button class="btnCards">?</button>
        <button class="btnCards">?</button>
        <button class="btnCards">?</button>
        <button class="btnCards">?</button>
        <button class="btnCards">?</button>
        <button class="btnCards">?</button>
        <button class="btnCards">?</button>
        <button class="btnCards">?</button>
        <button class="btnCards">?</button>
        <button class="btnCards">?</button>
        <button class="btnCards">?</button>
    </div>

    <div id="salvar" style="display:none;">
        <h2>Você venceu!</h2>
        <input type="text" id="nomeJogador" placeholder="Seu nome">
        <button id="btnSalvar">Salvar</button>
    </div>

    <script type="module" src="./js/main.js"></script>

</body>

</html>
